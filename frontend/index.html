<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Full Stack Developer Portfolio" />
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
    <style>
      /* Inline critical CSS to prevent FOUC */
      body { margin: 0; background: #0a0a0f; color: #f0eff6; font-family: 'DM Sans', sans-serif; }
      [data-theme="light"] body { background: #f8f8fc; color: #13121e; }
      #root-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0a0a0f; z-index: 9999; transition: opacity 0.3s;
      }
      #root-loader svg { animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg) } }
    </style>
  </head>
  <body>
    <div id="root-loader">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="12" stroke="rgba(255,255,255,0.1)" stroke-width="2.5"/>
        <path d="M14 2 A12 12 0 0 1 26 14" stroke="#7c6af7" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="root"></div>
    <script>
      // Apply saved theme immediately to prevent flash
      const saved = localStorage.getItem('portfolio_theme') || 'dark'
      document.documentElement.setAttribute('data-theme', saved)
      if (saved === 'light') document.getElementById('root-loader').style.background = '#f8f8fc'
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide loader once React mounts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const el = document.getElementById('root-loader')
          if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 300) }
        }, 200)
      })
    </script>
  </body>
</html>
